name: Test Email

on:
  workflow_dispatch:

jobs:
  test-email:
    runs-on: ubuntu-latest

    steps:
      - name: Send test email
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          python <<'PY'
          import os
          import smtplib
          from email.mime.text import MIMEText
          from email.header import Header
          from email.utils import formataddr
          from datetime import datetime, timezone

          smtp_host = os.environ.get("SMTP_HOST", "").strip()
          smtp_port_raw = os.environ.get("SMTP_PORT", "").strip()
          smtp_user = os.environ.get("SMTP_USER", "").strip()
          smtp_pass = os.environ.get("SMTP_PASS", "").strip()
          mail_to = os.environ.get("MAIL_TO", "").strip()

          print("SMTP_HOST exists:", bool(smtp_host))
          print("SMTP_PORT exists:", bool(smtp_port_raw))
          print("SMTP_USER exists:", bool(smtp_user))
          print("SMTP_PASS exists:", bool(smtp_pass))
          print("MAIL_TO exists:", bool(mail_to))

          if not smtp_host:
              raise SystemExit("Missing secret: SMTP_HOST")
          if not smtp_port_raw:
              raise SystemExit("Missing secret: SMTP_PORT")
          if not smtp_user:
              raise SystemExit("Missing secret: SMTP_USER")
          if not smtp_pass:
              raise SystemExit("Missing secret: SMTP_PASS")
          if not mail_to:
              raise SystemExit("Missing secret: MAIL_TO")

          try:
              smtp_port = int(smtp_port_raw)
          except ValueError:
              raise SystemExit(f"SMTP_PORT must be a number, got: {smtp_port_raw!r}")

          recipients = [
              x.strip()
              for x in mail_to.replace(";", ",").split(",")
              if x.strip()
          ]

          if not recipients:
              raise SystemExit("MAIL_TO is empty")

          print("SMTP host:", smtp_host)
          print("SMTP port:", smtp_port)
          print("Recipients:", ", ".join(recipients))

          body = f"""这是一封 GitHub Actions 测试邮件。

          如果你收到这封邮件，说明：
          1. GitHub Repository Secrets 配置正确
          2. QQ 邮箱 SMTP 授权码可用
          3. GitHub Actions 可以正常发邮件到你的邮箱
          
          发送时间 UTC：{datetime.now(timezone.utc).isoformat()}
          
          注意：这只测试邮件发送链路，不测试 Binance Alpha / Alpha123 数据源。
          """

          msg = MIMEText(body, "plain", "utf-8")
          msg["Subject"] = Header("GitHub Actions 邮件测试成功", "utf-8")
          msg["From"] = formataddr(("GitHub Actions Test", smtp_user))
          msg["To"] = ", ".join(recipients)

          print("Connecting to SMTP server...")

          server = smtplib.SMTP_SSL(smtp_host, smtp_port, timeout=30)
          try:
              print("Connected. Logging in...")
              server.login(smtp_user, smtp_pass)
              print("Login OK. Sending email...")
              server.sendmail(smtp_user, recipients, msg.as_string())
              print(f"Test email sent to: {', '.join(recipients)}")
          finally:
              server.quit()
          PY
