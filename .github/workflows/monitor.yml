name: Binance Alpha Email Monitor

on:
  schedule:
    - cron: '*/10 * * * *'

  workflow_dispatch:
    inputs:
      init:
        description: '首次初始化状态，不发邮件'
        required: false
        default: 'false'
      test_email:
        description: '只测试邮件，不检查 Alpha123'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -U cloudscraper requests

      - name: Test email only
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.test_email == 'true' }}
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          python <<'PY'
          import os
          import smtplib
          from email.mime.text import MIMEText
          from email.header import Header
          from email.utils import formataddr
          from datetime import datetime, timezone

          smtp_host = os.environ.get("SMTP_HOST", "smtp.qq.com")
          smtp_port = int(os.environ.get("SMTP_PORT", "465"))
          smtp_user = os.environ["SMTP_USER"]
          smtp_pass = os.environ["SMTP_PASS"]

          recipients = [
              x.strip()
              for x in os.environ["MAIL_TO"].replace(";", ",").split(",")
              if x.strip()
          ]

          body = f"""这是一封 GitHub Actions 测试邮件。

如果你收到这封邮件，说明：
1. GitHub Secrets 配置正确
2. QQ 邮箱 SMTP 授权码可用
3. GitHub Actions 可以正常发邮件到你的邮箱

发送时间 UTC：{datetime.now(timezone.utc).isoformat()}

注意：这只测试邮件发送链路，不测试 Alpha123 数据源。
"""

          msg = MIMEText(body, "plain", "utf-8")
          msg["Subject"] = Header("GitHub Actions 邮件测试成功", "utf-8")
          msg["From"] = formataddr(("GitHub Actions Test", smtp_user))
          msg["To"] = ", ".join(recipients)

          with smtplib.SMTP_SSL(smtp_host, smtp_port) as server:
              server.login(smtp_user, smtp_pass)
              server.sendmail(smtp_user, recipients, msg.as_string())

          print(f"Test email sent to: {', '.join(recipients)}")
          PY

      - name: Initialize state
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.init == 'true' && github.event.inputs.test_email != 'true' }}
        run: python monitor.py --init

      - name: Run monitor and send email
        if: ${{ (github.event_name != 'workflow_dispatch' || github.event.inputs.init != 'true') && (github.event_name != 'workflow_dispatch' || github.event.inputs.test_email != 'true') }}
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          set +e
          output=$(python monitor.py 2>&1)
          exit_code=$?
          echo "$output"

          if [ $exit_code -ne 0 ]; then
            echo "::warning::Monitor script failed with exit code $exit_code"
            exit 0
          fi

          echo "$output" > output.txt

          python <<'PY'
          import json
          import os
          import smtplib
          from email.mime.text import MIMEText
          from email.header import Header
          from email.utils import formataddr

          messages = []

          with open("output.txt", "r", encoding="utf-8") as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      data = json.loads(line)
                      text = data.get("text")
                      if text:
                          messages.append(text)
                  except Exception:
                      pass

          if not messages:
              print("No notification email needed")
              raise SystemExit(0)

          body = "\n\n----------------\n\n".join(messages)
          subject = "Binance Alpha 空投提醒"

          smtp_host = os.environ.get("SMTP_HOST", "smtp.qq.com")
          smtp_port = int(os.environ.get("SMTP_PORT", "465"))
          smtp_user = os.environ["SMTP_USER"]
          smtp_pass = os.environ["SMTP_PASS"]

          recipients = [
              x.strip()
              for x in os.environ["MAIL_TO"].replace(";", ",").split(",")
              if x.strip()
          ]

          msg = MIMEText(body, "plain", "utf-8")
          msg["Subject"] = Header(subject, "utf-8")
          msg["From"] = formataddr(("Alpha Monitor", smtp_user))
          msg["To"] = ", ".join(recipients)

          with smtplib.SMTP_SSL(smtp_host, smtp_port) as server:
              server.login(smtp_user, smtp_pass)
              server.sendmail(smtp_user, recipients, msg.as_string())

          print(f"Sent email to {len(recipients)} recipient(s)")
          PY

      - name: Commit state changes
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.test_email != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -f state.json ]; then
            git add state.json

            if ! git diff --staged --quiet; then
              git commit -m "Update state [skip ci]"
              git push
            else
              echo "No state changes to commit"
            fi
          else
            echo "state.json not found, skip commit"
          fi
