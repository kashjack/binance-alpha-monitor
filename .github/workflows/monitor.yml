name: Binance Alpha Email Monitor

on:
  schedule:
    - cron: '*/17 * * * *'

  workflow_dispatch:
    inputs:
      init:
        description: '首次初始化状态，不发邮件'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -U cloudscraper requests

      - name: Initialize state
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.init == 'true' }}
        run: python monitor.py --init

      - name: Run monitor and send email
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.init != 'true' }}
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          set +e
          output=$(python monitor.py 2>&1)
          exit_code=$?
          echo "$output"

          if [ $exit_code -ne 0 ]; then
            echo "::warning::Monitor script failed with exit code $exit_code"
            exit 0
          fi

          echo "$output" > output.txt

          python <<'PY'
          import json
          import os
          import smtplib
          from email.mime.text import MIMEText
          from email.header import Header
          from email.utils import formataddr

          messages = []

          with open("output.txt", "r", encoding="utf-8") as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue

                  try:
                      data = json.loads(line)
                  except Exception:
                      continue

                  text = data.get("text")
                  if text:
                      messages.append(text)

          if not messages:
              print("No notification email needed")
              raise SystemExit(0)

          smtp_host = os.environ.get("SMTP_HOST") or "smtp.qq.com"
          smtp_port = int(os.environ.get("SMTP_PORT") or "465")
          smtp_user = os.environ.get("SMTP_USER", "").strip()
          smtp_pass = os.environ.get("SMTP_PASS", "").strip()
          mail_to = os.environ.get("MAIL_TO", "").strip()

          missing = []
          if not smtp_user:
              missing.append("SMTP_USER")
          if not smtp_pass:
              missing.append("SMTP_PASS")
          if not mail_to:
              missing.append("MAIL_TO")

          if missing:
              raise SystemExit("Missing GitHub Secrets: " + ", ".join(missing))

          recipients = [
              x.strip()
              for x in mail_to.replace(";", ",").split(",")
              if x.strip()
          ]

          if not recipients:
              raise SystemExit("MAIL_TO is empty")

          body = "\n\n----------------\n\n".join(messages)
          subject = "Binance Alpha 空投提醒"

          msg = MIMEText(body, "plain", "utf-8")
          msg["Subject"] = Header(subject, "utf-8")
          msg["From"] = formataddr(("Alpha Monitor", smtp_user))
          msg["To"] = ", ".join(recipients)

          with smtplib.SMTP_SSL(smtp_host, smtp_port, timeout=30) as server:
              server.login(smtp_user, smtp_pass)
              server.sendmail(smtp_user, recipients, msg.as_string())

          print(f"Sent email to {len(recipients)} recipient(s)")
          PY

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -f state.json ]; then
            git add state.json

            if ! git diff --staged --quiet; then
              git commit -m "Update state [skip ci]"
              git push
            else
              echo "No state changes to commit"
            fi
          else
            echo "state.json not found, skip commit"
          fi
